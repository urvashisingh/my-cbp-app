apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  workflow_dispatch:
    inputs:
      manifest:
        type: string
metadata:
  stages/v1alpha1:
    - name: DEV
      jobs:
        - deploy-to-dev
        - publish-evidence
    - name: PROD
      jobs:
        - prod-approval
        - deploy-to-prod
jobs:
  deploy-to-dev:
    uses: ./.cloudbees/workflows/deploy.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: dev
  deploy-to-prod:
    needs:
      - prod-approval
    uses: ./.cloudbees/workflows/deploy.yaml
    with:
      manifest: ${{ inputs.manifest }}
      environment: prod
  publish-evidence:
    needs: deploy-to-dev
    steps:
      - with:
          content: "         | First Header  | Second Header |

            \            | ------------- | ------------- |

            \            | No Link       | [Link to prod](https://cloudbees.io/cloudbees/)  |

            \            | [Relative Link with leading slash](/cloudbees-preprod/f56b861b-e24b-411d-4a35-c3c2c1c277f0/components/9bf74eca-17d1-4a01-992a-1d092a9b9a7b/workflows?componentId=9bf74eca-17d1-4a01-992a-1d092a9b9a7b&organizationId=f56b861b-e24b-411d-4a35-c3c2c1c277f0)       | [Link to pre-prod](https://saas-preprod.beescloud.com)  |

            \            | [Relative Link without leading slash](cloudbees-preprod/f56b861b-e24b-411d-4a35-c3c2c1c277f0/components/9bf74eca-17d1-4a01-992a-1d092a9b9a7b/workflows?componentId=9bf74eca-17d1-4a01-992a-1d092a9b9a7b&organizationId=f56b861b-e24b-411d-4a35-c3c2c1c277f0)       | [Link to pre-prod](https://saas-preprod.beescloud.com)  |


            \           \ 

            \            [ JIRA fixed ](https://cloudbees.atlassian.net/browse/CBP-36141)

            \   "
        uses: cloudbees-io/publish-evidence-item@v1
        name: publish evidence
      - name: publish second evidence
        with:
          content: This is another evidence
        uses: cloudbees-io/publish-evidence-item@v1
  prod-approval:
    timeout-minutes: 4320
    delegates: cloudbees-io/manual-approval/custom-job.yml@v1
    needs: publish-evidence
    with:
      approvers: ""
      disallowLaunchByUser: false
      notifyAllEligibleUsers: false
      instructions: ""
      approvalInputs: |
        string_param:
          type: string
        num_param:
          type: number
          default: 5
        bool_param:
          type: boolean
          default: false
        choice_param:
          type: choice
          options:
            - op1
            - op2
          default: ""
